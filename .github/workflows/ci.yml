name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: genki
          POSTGRES_USER: genki
          POSTGRES_PASSWORD: genki
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genki -d genki"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      APP_SECRET_KEY: ci-only-secret-key-with-thirty-two-characters
      DATA_ENCRYPTION_KEY: ci-only-data-key-with-thirty-two-characters
      DATABASE_URL: postgres://genki:genki@localhost:5432/genki
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run db:migrate
      - run: bun run db:seed
      - run: bun run test
      - run: bun run build
      - run: docker compose config
